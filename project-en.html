    <style>
        * {
            margin: 0;
            padding: 0;

        }

        body {
            background: #f5f5f7;
            font-family: 'Inter', sans-serif;

        .top-panel {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: transparent;
            z-index: 20;
            pointer-events: none;
        }

        .burger {
            background: transparent;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: 0.2s;
            pointer-events: auto;
        }

        .burger span {
            width: 24px;
            height: 2.5px;
            background: #111;
            border-radius: 3px;
        }

        .burger:hover {
            background: rgba(0, 0, 0, 0.05);

        .header-title {
            font-family: 'Playfair Display', serif;

            background: rgba(245, 245, 247, 0.85);
            backdrop-filter: blur(8px);
            padding: 6px 24px;
            border-radius: 60px;
            pointer-events: none;
            border: 1px solid rgba(0,0,0,0.05);
            letter-spacing: -0.5px;
            white-space: nowrap;
        }

        .side-menu {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100%;
            background: white;
            box-shadow: -4px 0 24px rgba(0,0,0,0.1);
            z-index: 1100;
            padding: 100px 28px 40px;
            transition: right 0.3s ease;
            border-left: 1px solid #eaeaf0;
        }

        .side-menu.open {
            right: 0;
        }

        .side-menu a {
            display: block;
            font-size: 18px;
            font-weight: 500;
            color: #1a1a1e;
            text-decoration: none;
            padding: 14px 0;
            border-bottom: 1px solid #efeff2;
            transition: 0.2s;
        }

        .side-menu a:hover {
            color: #4a117c;
            padding-left: 8px;
        }

        .close-menu {
            position: absolute;
            top: 28px;
            left: 28px;
            font-size: 32px;
            cursor: pointer;
            color: #2a2a2e;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 1050;
            display: none;
        }

        .overlay.show {
            display: block;
        }
        
        .info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;

            z-index: 10;

        .info span {
            background: linear-gradient(135deg, #4a117c, #1a1a1a);

        @media (max-width: 768px) {

<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, cylinderGroup;
        const clickableObjects = [];
        
        const projects = [
            { name: 'Bauco', url: 'https://bau.in.th/service-en.html', img: 'images/bauco.png' },
            { name: 'Bread', url: 'https://samuibrew.tilda.ws/bread', img: 'images/bread.png' },
            { name: 'CV Bakharev', url: 'https://konstantinmedragon.github.io/CVBakharev/', img: 'images/CV.png' },
            { name: 'Medragon', url: 'https://medragon.tilda.ws/course', img: 'images/medragon.jpg' },
            { name: 'Pilates', url: 'https://pilatesbodyhome.ru/studio.html', img: 'images/pilates.png' },
            { name: 'Samui Brew', url: 'https://samuibrew.tilda.ws', img: 'images/samuibrew.png' }
        ];
        
        function updateCylinder() {
            const isMobile = window.innerWidth < 768;
            
            const topOffset = 80;
            const bottomOffset = 60;
            const availableHeight = window.innerHeight - topOffset - bottomOffset;
            
            let scaleFactor;
            if (isMobile) {
                scaleFactor = Math.min(availableHeight / 700, 1.2);
            } else {
                scaleFactor = Math.min(availableHeight / 800, 1.0);
            }
            
            let baseRadius, basePlaneWidth, basePlaneHeight, baseCameraDistance, baseSceneOffsetY;
            
            if (isMobile) {
                baseRadius = 0.5;
                basePlaneWidth = 0.35;
                basePlaneHeight = 0.7;
                baseCameraDistance = 2.8;
                baseSceneOffsetY = 0.4;
            } else {
                baseRadius = 2.28;
                basePlaneWidth = 1.0;
                basePlaneHeight = 2.0;
                baseCameraDistance = 6.1;
                baseSceneOffsetY = 1.2;
            }
            
            const radius = baseRadius * scaleFactor;
            const planeWidth = basePlaneWidth * scaleFactor;
            const planeHeight = basePlaneHeight * scaleFactor;
            const cameraDistance = baseCameraDistance * scaleFactor;
            const sceneOffsetY = baseSceneOffsetY * scaleFactor;
            
            const count = projects.length;
            const angleStep = (Math.PI * 2) / count;
            
            clickableObjects.forEach((plane, idx) => {
                const angle = idx * angleStep;
                const x = Math.sin(angle) * radius;
                const z = Math.cos(angle) * radius;
                plane.position.set(x, sceneOffsetY, z);
                
                const direction = new THREE.Vector3(x, 0, z).normalize();
                plane.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), direction);
                
                if (plane.geometry) plane.geometry.dispose();
                plane.geometry = new THREE.PlaneGeometry(planeWidth, planeHeight);
            });
            
            camera.position.set(0, sceneOffsetY + 0.5 * scaleFactor, cameraDistance);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            
            renderer.setSize(window.innerWidth, window.innerHeight);
            controls.target.set(0, sceneOffsetY, 0);
            controls.update();
        }
        
        function initScene() {
            const isMobile = window.innerWidth < 768;
            
            const topOffset = 80;
            const bottomOffset = 60;
            const availableHeight = window.innerHeight - topOffset - bottomOffset;
            
            let scaleFactor;
            if (isMobile) {
                scaleFactor = Math.min(availableHeight / 700, 1.2);
            } else {
                scaleFactor = Math.min(availableHeight / 800, 1.0);
            }
            
            let baseRadius, basePlaneWidth, basePlaneHeight, baseCameraDistance, baseSceneOffsetY;
            
            if (isMobile) {
                baseRadius = 0.5;
                basePlaneWidth = 0.35;
                basePlaneHeight = 0.7;
                baseCameraDistance = 2.8;
                baseSceneOffsetY = 0.4;
            } else {
                baseRadius = 2.28;
                basePlaneWidth = 1.0;
                basePlaneHeight = 2.0;
                baseCameraDistance = 6.1;
                baseSceneOffsetY = 1.2;
            }
            
            const radius = baseRadius * scaleFactor;
            const planeWidth = basePlaneWidth * scaleFactor;
            const planeHeight = basePlaneHeight * scaleFactor;
            const cameraDistance = baseCameraDistance * scaleFactor;
            const sceneOffsetY = baseSceneOffsetY * scaleFactor;
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf5f5f7);
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, sceneOffsetY + 0.5 * scaleFactor, cameraDistance);
            camera.lookAt(0, sceneOffsetY, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.9);
            directionalLight.position.set(1, 2, 1);
            scene.add(directionalLight);
            const backLight = new THREE.DirectionalLight(0xffffff, 0.4);
            backLight.position.set(-1, 1, -1);
            scene.add(backLight);
            
            const count = projects.length;
            const angleStep = (Math.PI * 2) / count;
            cylinderGroup = new THREE.Group();
            const textureLoader = new THREE.TextureLoader();
            
            projects.forEach((project, index) => {
                const angle = index * angleStep;
                const x = Math.sin(angle) * radius;
                const z = Math.cos(angle) * radius;
                
                const texture = textureLoader.load(project.img);
                texture.minFilter = THREE.LinearFilter;
                
                const material = new THREE.MeshStandardMaterial({
                    map: texture,
                    side: THREE.DoubleSide,
                    roughness: 0.3,
                    metalness: 0.05
                });
                
                const plane = new THREE.Mesh(
                    new THREE.PlaneGeometry(planeWidth, planeHeight),
                    material
                );
                
                plane.position.set(x, sceneOffsetY, z);
                
                const direction = new THREE.Vector3(x, 0, z).normalize();
                plane.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), direction);
                
                plane.userData = { url: project.url, name: project.name };
                clickableObjects.push(plane);
                cylinderGroup.add(plane);
            });
            
            scene.add(cylinderGroup);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.2;
            controls.enableZoom = true;
            controls.enablePan = false;
            controls.zoomSpeed = 0.8;
            controls.target.set(0, sceneOffsetY, 0);
            controls.rotateSpeed = 1.0;
            
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            
            function onPointerClick(event) {
                let clientX, clientY;
                if (event.touches) {
                    clientX = event.touches[0].clientX;
                    clientY = event.touches[0].clientY;
                } else {
                    clientX = event.clientX;
                    clientY = event.clientY;
                }
                
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(clickableObjects);
                
                if (intersects.length > 0) {
                    const hit = intersects[0].object;
                    if (hit.userData && hit.userData.url) {
                        window.open(hit.userData.url, '_blank');
                    }
                }
            }
            
            window.addEventListener('click', onPointerClick, false);
            window.addEventListener('touchstart', onPointerClick, false);
            
            function resetAndRestartAutoRotate() {
                if (controls) {
                    controls.autoRotate = false;
                    setTimeout(() => {
                        controls.autoRotate = true;
                    }, 100);
                }
            }
            
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    resetAndRestartAutoRotate();
                }
            });
            
            window.addEventListener('focus', () => {
                resetAndRestartAutoRotate();
            });
            
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
            
            window.addEventListener('resize', () => {
                updateCylinder();
            });
        }
        
        initScene();

        const burger = document.getElementById('burgerBtn');
        const menu = document.getElementById('sideMenu');
        const overlay = document.getElementById('overlay');
        const closeMenu = document.getElementById('closeMenu');

        function openMenu() {
            menu.classList.add('open');
            overlay.classList.add('show');
        }

        function closeMenuFunc() {
            menu.classList.remove('open');
            overlay.classList.remove('show');
        }

        burger.addEventListener('click', openMenu);
        closeMenu.addEventListener('click', closeMenuFunc);
        overlay.addEventListener('click', closeMenuFunc);
    </script>
</body>
