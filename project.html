<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Галерея проектов — Небесное бюро дизайна</title>
    <link rel="canonical" href="https://skycode.codes/project.html" />
    <meta name="description" content="Портфолио проектов Небесного бюро дизайна: сайты для Bauco, Bread, CV, Medragon, Pilates, Samui Brew.">
    <meta name="robots" content="index, follow">
    
    <meta property="og:title" content="Галерея проектов — Небесное бюро дизайна">
    <meta property="og:description" content="Вращающийся цилиндр с нашими работами. Нажмите на любой проект, чтобы перейти на сайт.">
    <meta property="og:image" content="https://skycode.codes/images/bauco.png">
    <meta property="og:url" content="https://skycode.codes/project.html">
    <meta property="og:type" content="website">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f7;
        }
        
        canvas {
            cursor: pointer;
        }
        
        .header-title {
            position: absolute;
            top: 24px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            font-family: 'Inter', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #111;
            background: rgba(245, 245, 247, 0.85);
            backdrop-filter: blur(8px);
            padding: 8px 24px;
            width: fit-content;
            margin: 0 auto;
            border-radius: 60px;
            pointer-events: none;
            border: 1px solid rgba(0,0,0,0.05);
            letter-spacing: -0.3px;
        }
        
        .info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            color: #111;
            background: rgba(245, 245, 247, 0.85);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 40px;
            width: fit-content;
            margin: 0 auto;
            font-size: 13px;
            font-weight: 500;
            pointer-events: none;
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .info a {
            color: #4a117c;
            text-decoration: none;
            pointer-events: auto;
            font-weight: 600;
        }
        
        .info a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 600px) {
            .header-title { font-size: 18px; top: 16px; padding: 4px 16px; }
            .info { font-size: 10px; bottom: 10px; padding: 6px 14px; }
        }
    </style>
</head>
<body>
    <div class="header-title">портфолио проектов</div>
    <div class="info">
        <a href="https://skycode.codes/" target="_blank">небесное бюро дизайна</a>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, cylinderGroup;
        const clickableObjects = [];
        
        const projects = [
            { name: 'Bauco', url: 'https://konstantinmedragon.github.io/bau/index-en.html', img: 'images/bauco.png' },
            { name: 'Bread', url: 'https://samuibrew.tilda.ws/bread', img: 'images/bread.png' },
            { name: 'CV Bakharev', url: 'https://konstantinmedragon.github.io/CVBakharev/', img: 'images/CV.png' },
            { name: 'Medragon', url: 'https://medragon.tilda.ws/course', img: 'images/medragon.jpg' },
            { name: 'Pilates', url: 'https://pilatesbodyhome.ru/studio.html', img: 'images/pilates.png' },
            { name: 'Samui Brew', url: 'https://samuibrew.tilda.ws', img: 'images/samuibrew.png' }
        ];
        
        function updateCylinder() {
            const width = window.innerWidth;
            const isMobile = width < 768;
            
            // Радиус и размеры карточек НЕ МЕНЯЕМ, только поднимаем цилиндр
            let radius, planeWidth, planeHeight, cameraDistance, cameraY, cylinderY;
            if (isMobile) {
                radius = 1.42;
                planeWidth = 0.68;
                planeHeight = 1.37;
                cameraDistance = 4.0;
                cameraY = 1.82;        // было 1.65 → +10%
                cylinderY = 0.143;      // было 0.13 → +10%
            } else {
                radius = 2.28;
                planeWidth = 1.0;
                planeHeight = 2.0;
                cameraDistance = 6.1;
                cameraY = 2.18;         // было 1.98 → +10%
                cylinderY = 0.198;       // было 0.18 → +10%
            }
            
            const count = projects.length;
            const angleStep = (Math.PI * 2) / count;
            
            clickableObjects.forEach((plane, idx) => {
                const angle = idx * angleStep;
                const x = Math.sin(angle) * radius;
                const z = Math.cos(angle) * radius;
                plane.position.set(x, cylinderY, z);
                
                // Наружу через кватернион
                const direction = new THREE.Vector3(x, 0, z).normalize();
                plane.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), direction);
                
                // Обновляем геометрию (размеры не меняем)
                const oldGeo = plane.geometry;
                const newGeo = new THREE.PlaneGeometry(planeWidth, planeHeight);
                plane.geometry = newGeo;
                if (oldGeo) oldGeo.dispose();
            });
            
            camera.position.set(0, cameraY, cameraDistance);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            
            renderer.setSize(window.innerWidth, window.innerHeight);
            controls.target.set(0, cylinderY, 0);
            controls.update();
        }
        
        function initScene() {
            const width = window.innerWidth;
            const isMobile = width < 768;
            
            let radius, planeWidth, planeHeight, cameraDistance, cameraY, cylinderY;
            if (isMobile) {
                radius = 1.42;
                planeWidth = 0.68;
                planeHeight = 1.37;
                cameraDistance = 4.0;
                cameraY = 1.82;
                cylinderY = 0.143;
            } else {
                radius = 2.28;
                planeWidth = 1.0;
                planeHeight = 2.0;
                cameraDistance = 6.1;
                cameraY = 2.18;
                cylinderY = 0.198;
            }
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf5f5f7);
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, cameraY, cameraDistance);
            camera.lookAt(0, cylinderY, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            
            // Освещение
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.9);
            directionalLight.position.set(1, 2, 1);
            scene.add(directionalLight);
            const backLight = new THREE.DirectionalLight(0xffffff, 0.4);
            backLight.position.set(-1, 1, -1);
            scene.add(backLight);
            
            const count = projects.length;
            const angleStep = (Math.PI * 2) / count;
            cylinderGroup = new THREE.Group();
            const textureLoader = new THREE.TextureLoader();
            
            projects.forEach((project, index) => {
                const angle = index * angleStep;
                const x = Math.sin(angle) * radius;
                const z = Math.cos(angle) * radius;
                
                const texture = textureLoader.load(project.img);
                texture.minFilter = THREE.LinearFilter;
                
                const material = new THREE.MeshStandardMaterial({
                    map: texture,
                    side: THREE.DoubleSide,
                    roughness: 0.3,
                    metalness: 0.05
                });
                
                const plane = new THREE.Mesh(
                    new THREE.PlaneGeometry(planeWidth, planeHeight),
                    material
                );
                
                plane.position.set(x, cylinderY, z);
                
                // Поворот наружу через кватернион
                const direction = new THREE.Vector3(x, 0, z).normalize();
                plane.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), direction);
                
                plane.userData = { url: project.url, name: project.name };
                clickableObjects.push(plane);
                cylinderGroup.add(plane);
            });
            
            scene.add(cylinderGroup);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = !isMobile;
            controls.autoRotateSpeed = 0.8;
            controls.enableZoom = true;
            controls.enablePan = false;
            controls.zoomSpeed = 0.8;
            controls.target.set(0, cylinderY, 0);
            
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            
            function onClick(event) {
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(clickableObjects);
                
                if (intersects.length > 0) {
                    const hit = intersects[0].object;
                    if (hit.userData && hit.userData.url) {
                        window.open(hit.userData.url, '_blank');
                    }
                }
            }
            
            window.addEventListener('click', onClick, false);
            
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
            
            window.addEventListener('resize', () => {
                updateCylinder();
            });
        }
        
        initScene();
    </script>
</body>
</html>
